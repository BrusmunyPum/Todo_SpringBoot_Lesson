# ─── Test Database ────────────────────────────────────────────────────────────
# Use the same PostgreSQL instance but a separate test database
# so tests never touch your real development data
spring.datasource.url=jdbc:postgresql://localhost:5432/todo_test_db
spring.datasource.username=Muny
spring.datasource.password=Muny168168

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ───────────────────────────────────────────────────────────────────
# Let Flyway run our real migrations on the test database
spring.flyway.enabled=true
spring.flyway.clean-on-validation-error=false
